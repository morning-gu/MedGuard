version: '3.8'

services:
  medguard-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=medguard-7b-qlora
      - QUANTIZATION=int4
      - MAX_BATCH_SIZE=8
      - RISK_THRESHOLD=0.7
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    
  medguard-gradio:
    build: ./gradio-demo
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://medguard-api:8000
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    depends_on:
      medguard-api:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Redis for caching results
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: medguard-network
